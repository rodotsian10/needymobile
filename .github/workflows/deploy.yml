name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'rodotsian10/needymobile'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Fix paths for GitHub Pages
        run: |
          find dist -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i 's|"/assets/|"/needymobile/assets/|g' {} +
          find dist -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i "s|'/assets/|'/needymobile/assets/|g" {} +
          find dist -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i 's|`/assets/|`/needymobile/assets/|g' {} +

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
