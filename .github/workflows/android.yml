name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Install Capacitor CLI & Plugins
      run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/keyboard

    - name: Init Capacitor (non-interactive)
      run: npx cap init "AmeOS" "com.ameos.app" --web-dir dist --no-interactive || true

    - name: Write capacitor.config.json
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.ameos.app",
          "appName": "AmeOS",
          "webDir": "dist",
          "server": {
            "androidScheme": "https"
          },
          "plugins": {
            "Keyboard": {
              "resize": "none"
            }
          }
        }
        EOF

    - name: Add Android Platform
      run: |
        npx cap add android
        npx cap sync android

    - name: Generate App Icons from ame.png
      run: |
        sudo apt-get install -y imagemagick
        # Delete adaptive icon XML files to force Android to use the PNGs we generate
        rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
        
        # Generate standard Android icon sizes
        declare -A SIZES=( ["mipmap-mdpi"]=48 ["mipmap-hdpi"]=72 ["mipmap-xhdpi"]=96 ["mipmap-xxhdpi"]=144 ["mipmap-xxxhdpi"]=192 )
        for dir in "${!SIZES[@]}"; do
          size="${SIZES[$dir]}"
          mkdir -p android/app/src/main/res/$dir
          convert public/assets/images/icons/ame.png -filter Point -resize ${size}x${size} android/app/src/main/res/$dir/ic_launcher.png
          convert public/assets/images/icons/ame.png -filter Point -resize ${size}x${size} android/app/src/main/res/$dir/ic_launcher_round.png
        done

    - name: Set Gradle permissions
      run: chmod +x android/gradlew

    - name: Build APK
      working-directory: android
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AmeOS-Android-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
