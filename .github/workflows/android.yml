name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Install Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Ame OS" "com.ameos.app" --web-dir dist

    - name: Add Android Platform
      run: |
        npx cap add android
        npx cap sync android

    - name: Prepare App Icon & Splash (Pixel Art Scaling)
      run: |
        mkdir assets
        sudo apt-get install -y imagemagick
        convert public/assets/images/icons/ame.png -scale 1024x1024 assets/icon.png
        convert public/assets/images/icons/ame.png -scale 2732x2732 assets/splash.png
        npm install -g @capacitor/assets
        npx @capacitor/assets generate --android

    - name: Build APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AmeOS-Android-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
